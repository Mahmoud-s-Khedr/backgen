name: Examples CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/run-examples.js"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/examples.yml"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/run-examples.js"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/examples.yml"

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build generator
        run: pnpm run build

      - name: Run examples
        run: pnpm run examples

      - name: Upload example logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-logs
          path: logs/**
          if-no-files-found: ignore

      - name: Upload example outputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: examples-debug
          path: out/**
          if-no-files-found: ignore
