name: Examples CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/run-examples.js"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/examples.yml"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/run-examples.js"
      - "examples/**"
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/examples.yml"

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install root dependencies
        run: npm ci

      - name: Build generator
        run: npm run build

      - name: Run examples
        run: npm run examples

      - name: Upload example artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: examples-debug
          path: |
            logs/**
            out/**
          if-no-files-found: ignore
