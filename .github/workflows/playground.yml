name: Playground CI

on:
  pull_request:
    paths:
      - "packages/playground/**"
      - "src/**"
      - ".github/workflows/playground.yml"
  push:
    branches: ["main"]
    paths:
      - "packages/playground/**"
      - "src/**"
      - ".github/workflows/playground.yml"

jobs:
  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/playground/pnpm-lock.yaml
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install playground dependencies
        working-directory: packages/playground
        run: pnpm install --frozen-lockfile
      - name: Verify templates bundle is deterministic
        working-directory: packages/playground
        run: |
          node build-templates.js
          git diff --exit-code src/generated/templates.ts
      - name: Typecheck
        working-directory: packages/playground
        run: pnpm run typecheck
      - name: Test
        working-directory: packages/playground
        run: pnpm test
      - name: Build
        working-directory: packages/playground
        run: pnpm run build
